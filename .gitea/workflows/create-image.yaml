name: 🤓 Individual Runners

on:    
  push:
    branches: [main]
    paths: 
      - versions.txt
      - dockerfiles/runner.dockerfile
      - .gitea/workflows/create-image.yaml

  workflow_dispatch:
    inputs:
      unity_version:
        description: 'Unity Version'
        required: false
        default: '6000.0.35f1'
        type: string
      platform:
        description: 'Platform'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - webgl
          - android
          - ios
          - mac-mono
          - windows-mono
          - linux-il2cpp

env:
  DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY != '' && vars.DOCKER_REGISTRY || 'docker.io' }}
  GAMECI_OS: ubuntu
  GAMECI_VERSION: 3

jobs:
  version:
    runs-on: ubuntu-latest
    name: 🧾 Check Unity Version
    outputs:
      UNITY_VERSION: ${{ steps.get-version.outputs.UNITY_VERSION }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: versions.txt

      - name: Get Unity Version
        id: get-version
        run: |
          if [ -z "${{ github.event.inputs.unity_version }}" ]; then
            VERSION=$(head -n 1 versions.txt)
          else
            VERSION="${{ github.event.inputs.unity_version }}"
          fi
          
          echo "Unity Version: $VERSION"
          echo "UNITY_VERSION=$VERSION" >> "$GITHUB_OUTPUT"

  precache:
    runs-on: ubuntu-latest
    name: 📦️ Mirror GameCI's editor
    needs: version
    env:
      UNITY_VERSION: ${{ needs.version.outputs.UNITY_VERSION }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: versions.txt

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Cache Base Image
        run: |
          set -eux
          skopeo login --tls-verify=false \
            --username "${{ secrets.DOCKER_USERNAME }}" \
            --password "${{ secrets.DOCKER_PASSWORD }}" \
            ${{ env.DOCKER_REGISTRY }}
          
          TAG="${GAMECI_OS}-${{ env.UNITY_VERSION }}-base-${GAMECI_VERSION}"
          skopeo copy \
            --dest-tls-verify=false \
            docker://docker.io/unityci/editor:${TAG} \
            docker://${{ env.DOCKER_REGISTRY }}/unityci/editor:${TAG}

  build:
    runs-on: ubuntu-latest
    needs: [ version, precache ]
    env:
      UNITY_VERSION: ${{ needs.version.outputs.UNITY_VERSION }}

    strategy:
      max-parallel: 1
      matrix:
        platform: 
          - webgl
          - android
          - ios
          - mac-mono
          - windows-mono
          - linux-il2cpp
        
    name: Build 🐳 ${{ matrix.platform }}
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == '' || github.event.inputs.platform == matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull images
        run: |
          BASE_TAG="$${GAMECI_OS}-${{ env.UNITY_VERSION }}-base-${GAMECI_VERSION}"
          echo "Pulling base image $BASE_TAG"
          docker pull "${{ env.DOCKER_REGISTRY }}/unityci/editor:$BASE_TAG"
          echo "BASE_TAG=$BASE_TAG" >> "$GITHUB_OUTPUT"

          IMAGE_TAG="${GAMECI_OS}-${{ env.UNITY_VERSION }}-${matrix.platform}-runner"
          echo "Pulling existing image $IMAGE_TAG to populate cache"
          docker pull "${{ env.DOCKER_REGISTRY }}/unityci/editor:$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build docker
        run: .gitea/workflows/scripts/build-runner-image.sh
        id: build-image
        env:
          EDITOR_CACHE_REGISTRY: ${{ env.DOCKER_REGISTRY }}
          GAMECI_OS: ${{ env.GAMECI_OS }}
          GAMECI_VERSION: ${{ env.GAMECI_VERSION }}
          IMAGE: ${{ env.DOCKER_REGISTRY }}/unityci/editor
          TAG: ${{ env.GAMECI_OS }}-${{ env.UNITY_VERSION }}-${{ matrix.platform }}-runner
          UNITY_MODULES: ${{ matrix.platform }}
          UNITY_VERSION: ${{ env.UNITY_VERSION }}

      - name: Push image
        run: |
            echo "Pushing Docker Image  ${{ steps.build-image.outputs.FULL_IMAGE }}"
            echo "- Image: ${{ steps.build-image.outputs.IMAGE }}"
            echo "- Tag: ${{ steps.build-image.outputs.TAG }}"
            docker push ${{ steps.build-image.outputs.FULL_IMAGE }}

      - name: Cleanup
        if: always()
        run: |
          docker builder prune -f
